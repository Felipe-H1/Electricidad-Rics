<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador Eléctrico | Chile</title>
    <script src="preguntas.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e1e; color: #cccccc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .app-container { background-color: #252526; padding: 30px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); max-width: 600px; width: 90%; border-top: 4px solid #007acc; max-height: 90vh; overflow-y: auto; }
        h1 { color: #ffffff; font-size: 24px; text-align: center; margin-bottom: 25px; }
        h2 { color: #a8e6cf; font-size: 18px; text-align: center; margin-bottom: 20px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .menu-btn { background-color: #333333; color: #ffffff; border: 1px solid #3e3e42; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; margin-bottom: 15px; transition: 0.2s; font-weight: bold; }
        .menu-btn:hover { background-color: #007acc; border-color: #005f9e; transform: translateX(5px); }
        .btn-disabled { background-color: #1e1e1e; color: #666; cursor: not-allowed; border-style: dashed; }
        .btn-back { background-color: transparent; color: #888; border: 1px solid #888; margin-top: 10px; }
        .btn-back:hover { background-color: #333; color: white; }
        .ric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .ric-checkbox { display: flex; align-items: center; background: #333; padding: 8px; border-radius: 4px; border: 1px solid #444; cursor: pointer; font-size: 14px; user-select: none; }
        .ric-checkbox input { margin-right: 8px; }
        .input-group { margin-bottom: 20px; text-align: center; background: #333; padding: 15px; border-radius: 6px; border: 1px solid #444;}
        .input-group input { padding: 10px; border-radius: 4px; border: 1px solid #007acc; background: #1e1e1e; color: white; width: 80px; text-align: center; font-size: 18px; font-weight: bold; }
        #max-qty-label { display: block; margin-top: 5px; font-size: 13px; color: #a8e6cf; }
        .score-board { text-align: center; font-size: 14px; color: #888; margin-bottom: 25px; border-bottom: 1px solid #3e3e42; padding-bottom: 10px; }
        .question { font-size: 18px; color: #ffffff; margin-bottom: 20px; line-height: 1.4; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: #333333; color: #cccccc; border: 1px solid #3e3e42; padding: 15px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 16px; }
        .correct { background-color: #2e7d32 !important; color: white !important; }
        .wrong { background-color: #c62828 !important; color: white !important; }
        .feedback { margin-top: 20px; font-size: 14px; min-height: 40px; color: #a8e6cf; }
        #next-btn { background-color: #007acc; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="screen-main" class="screen active">
            <h1>Entrenador Eléctrico</h1>
            <h2>Selecciona tu área de estudio</h2>
            <button class="menu-btn" onclick="showScreen('screen-intro')">⚡ Introducción a la Electricidad</button>
            <button class="menu-btn" onclick="showScreen('screen-ric')">📚 Estudiar Normativa RIC (1 al 19)</button>
            <button class="menu-btn btn-disabled" onclick="alert('Pronto módulo de cálculos.')">📐 Estudiar Cálculos Matemáticos (Pronto)</button>
        </div>

        <div id="screen-intro" class="screen">
            <h1>Introducción</h1>
            <h2>Selecciona la longitud del test</h2>
            <button class="menu-btn" onclick="iniciarTestIntro(10)">⏱️ Test Corto (10 Preguntas)</button>
            <button class="menu-btn" onclick="iniciarTestIntro(20)">📝 Test Intermedio (20 Preguntas)</button>
            <button class="menu-btn btn-back" onclick="showScreen('screen-main')">← Volver al inicio</button>
        </div>

        <div id="screen-ric" class="screen">
            <h1>Normativa RIC</h1>
            <h2>Selecciona la longitud del test</h2>
            <button class="menu-btn" onclick="iniciarTestAleatorioRIC(10)">⏱️ Test Corto (10 Preguntas)</button>
            <button class="menu-btn" onclick="iniciarTestAleatorioRIC(20)">📝 Test Intermedio (20 Preguntas)</button>
            <button class="menu-btn" onclick="iniciarTestAleatorioRIC(30)">🔥 Test Largo (30 Preguntas)</button>
            <button class="menu-btn" onclick="showScreen('screen-custom')">⚙️ Test Personalizado (Elegir Pliegos)</button>
            <button class="menu-btn btn-back" onclick="showScreen('screen-main')">← Volver al inicio</button>
        </div>

        <div id="screen-custom" class="screen">
            <h1>Test Personalizado</h1>
            <div class="ric-grid" id="ric-checkboxes"></div>
            <div class="input-group">
                <label style="display:block; margin-bottom:8px;">¿Cuántas preguntas quieres?</label>
                <input type="number" id="custom-qty" value="0" min="1" disabled>
                <span id="max-qty-label">Selecciona pliegos</span>
            </div>
            <button class="menu-btn" id="btn-iniciar-custom" onclick="iniciarTestPersonalizado()" disabled>🚀 Iniciar</button>
            <button class="menu-btn btn-back" onclick="showScreen('screen-ric')">← Volver</button>
        </div>

        <div id="screen-quiz" class="screen">
            <h1 id="quiz-title">Quiz</h1>
            <div id="quiz-content">
                <div class="score-board">Pregunta <span id="current-question-text">1</span> de <span id="total-questions-text">X</span> | Puntaje: <span id="score-text">0</span></div>
                <div class="question" id="question-text"></div>
                <div class="options" id="options-container"></div>
                <div class="feedback" id="feedback-text"></div>
                <button id="next-btn" onclick="siguientePregunta()">Siguiente</button>
            </div>
            <div id="results-content" style="display: none; text-align: center;">
                <h2>¡Completado!</h2>
                <p>Puntaje final: <br><strong style="font-size: 36px; color: #a8e6cf;" id="final-score">0</strong> de <span id="max-score">0</span></p>
                <button class="menu-btn" onclick="reintentarTest()">🔄 Reintentar</button>
                <button class="menu-btn btn-back" onclick="showScreen('screen-main')">🏠 Menú Principal</button>
            </div>
        </div>
    </div>

    <script>
        let preguntasDelTest = [];
        let preguntaActual = 0;
        let puntaje = 0;
        let lastConfig = {};

        window.onload = () => {
            const grid = document.getElementById('ric-checkboxes');
            for(let i=1; i<=19; i++) {
                grid.innerHTML += `<label class="ric-checkbox"><input type="checkbox" class="ric-cb" value="${i}"> RIC ${i}</label>`;
            }
            document.querySelectorAll('.ric-cb').forEach(cb => cb.addEventListener('change', recalcularMaximoPreguntas));
        };

        function recalcularMaximoPreguntas() {
            let seleccionados = Array.from(document.querySelectorAll('.ric-cb:checked')).map(cb => parseInt(cb.value));
            let inputQty = document.getElementById('custom-qty');
            let labelMax = document.getElementById('max-qty-label');
            let btnIniciar = document.getElementById('btn-iniciar-custom');
            let cantidadDisponible = baseDePreguntas.filter(p => seleccionados.includes(p.pliego)).length;

            inputQty.disabled = seleccionados.length === 0;
            btnIniciar.disabled = cantidadDisponible === 0;
            inputQty.max = cantidadDisponible;
            labelMax.innerText = `Máximo disponible: ${cantidadDisponible}`;
            if(cantidadDisponible > 0 && inputQty.value == 0) inputQty.value = Math.min(10, cantidadDisponible);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function mezclar(array) { return array.sort(() => Math.random() - 0.5); }

        function iniciarTestAleatorioRIC(cant) {
            let pool = baseDePreguntas.filter(p => typeof p.pliego === 'number');
            prepararYArrancarTest(pool, cant, "Normativa RIC");
            lastConfig = { tipo: 'ric', cantidad: cant };
        }

        function iniciarTestIntro(cant) {
            let pool = baseDePreguntas.filter(p => p.pliego === 'intro');
            prepararYArrancarTest(pool, cant, "Introducción");
            lastConfig = { tipo: 'intro', cantidad: cant };
        }

        function iniciarTestPersonalizado() {
            let seleccionados = Array.from(document.querySelectorAll('.ric-cb:checked')).map(cb => parseInt(cb.value));
            let cant = parseInt(document.getElementById('custom-qty').value);
            let pool = baseDePreguntas.filter(p => seleccionados.includes(p.pliego));
            prepararYArrancarTest(pool, cant, "RIC Personalizado");
            lastConfig = { tipo: 'custom', cantidad: cant, rics: seleccionados };
        }

        function prepararYArrancarTest(pool, cant, titulo) {
            document.getElementById("results-content").style.display = "none";
            document.getElementById("quiz-content").style.display = "block";
            document.getElementById("quiz-title").innerText = titulo;
            
            preguntasDelTest = mezclar([...pool]).slice(0, cant).map(p => {
                let opcionesLimpias = p.opciones.map(o => o.replace(/^[A-D]\)\s*/, ''));
                let correctaText = opcionesLimpias[p.respuestaCorrecta];
                let revueltas = mezclar([...opcionesLimpias]);
                return { pregunta: p.pregunta, opciones: revueltas, respuestaCorrecta: revueltas.indexOf(correctaText), explicacion: p.explicacion };
            });

            preguntaActual = 0; puntaje = 0;
            document.getElementById("total-questions-text").innerText = preguntasDelTest.length;
            showScreen('screen-quiz'); cargarPregunta();
        }

        function cargarPregunta() {
            document.getElementById("feedback-text").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            const container = document.getElementById("options-container");
            container.innerHTML = "";
            const p = preguntasDelTest[preguntaActual];
            document.getElementById("current-question-text").innerText = preguntaActual + 1;
            document.getElementById("question-text").innerText = p.pregunta;

            p.opciones.forEach((opt, i) => {
                const btn = document.createElement("button");
                btn.innerText = `${String.fromCharCode(65 + i)}) ${opt}`;
                btn.classList.add("option-btn");
                btn.onclick = () => {
                    if(document.getElementById("next-btn").style.display === "block") return;
                    const btns = container.querySelectorAll("button");
                    btns.forEach(b => b.style.pointerEvents = "none");
                    if(i === p.respuestaCorrecta) { btn.classList.add("correct"); puntaje += 10; }
                    else { btn.classList.add("wrong"); btns[p.respuestaCorrecta].classList.add("correct"); }
                    document.getElementById("feedback-text").innerText = p.explicacion;
                    document.getElementById("score-text").innerText = puntaje;
                    document.getElementById("next-btn").style.display = "block";
                };
                container.appendChild(btn);
            });
        }

        function siguientePregunta() {
            preguntaActual++;
            if (preguntaActual < preguntasDelTest.length) cargarPregunta();
            else {
                document.getElementById("quiz-content").style.display = "none";
                document.getElementById("results-content").style.display = "block";
                document.getElementById("final-score").innerText = puntaje;
                document.getElementById("max-score").innerText = preguntasDelTest.length * 10;
            }
        }

        function reintentarTest() {
            if(lastConfig.tipo === 'ric') iniciarTestAleatorioRIC(lastConfig.cantidad);
            else if(lastConfig.tipo === 'intro') iniciarTestIntro(lastConfig.cantidad);
            else iniciarTestPersonalizado();
        }
    </script>
</body>
</html>
