<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenador Eléctrico Pro | Chile</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #cccccc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            background-color: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 90%;
            border-top: 4px solid #007acc;
            max-height: 90vh;
            overflow-y: auto;
        }

        h1 {
            color: #ffffff;
            font-size: 24px;
            text-align: center;
            margin-bottom: 25px;
        }

        h2 {
            color: #a8e6cf;
            font-size: 18px;
            text-align: center;
            margin-bottom: 20px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .menu-btn {
            background-color: #333333;
            color: #ffffff;
            border: 1px solid #3e3e42;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-bottom: 15px;
            transition: 0.2s;
            font-weight: bold;
        }

        .menu-btn:hover {
            background-color: #007acc;
            border-color: #005f9e;
            transform: translateX(5px);
        }

        .btn-disabled {
            background-color: #1e1e1e;
            color: #666;
            cursor: not-allowed;
            border-style: dashed;
        }
        .btn-disabled:hover {
            background-color: #1e1e1e;
            border-color: #3e3e42;
            transform: none;
        }

        .btn-back {
            background-color: transparent;
            color: #888;
            border: 1px solid #888;
            margin-top: 10px;
        }
        .btn-back:hover { background-color: #333; color: white; }

        .score-board {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 25px;
            border-bottom: 1px solid #3e3e42;
            padding-bottom: 10px;
        }

        .question {
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .options { display: flex; flex-direction: column; gap: 12px; }

        .option-btn {
            background-color: #333333;
            color: #cccccc;
            border: 1px solid #3e3e42;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        .option-btn:hover { background-color: #3e3e42; border-color: #007acc; }

        .correct { background-color: #2e7d32 !important; color: white !important; border-color: #4caf50 !important; }
        .wrong { background-color: #c62828 !important; color: white !important; border-color: #f44336 !important; }

        .feedback {
            margin-top: 20px;
            font-size: 14px;
            min-height: 40px;
            color: #a8e6cf;
            line-height: 1.5;
        }

        #next-btn {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            display: none;
        }
        #next-btn:hover { background-color: #005f9e; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="screen-main" class="screen active">
            <h1>Entrenador Eléctrico Pro</h1>
            <h2>Selecciona tu área de estudio</h2>
            <button class="menu-btn" onclick="showScreen('screen-ric')">📚 Estudiar Normativa RIC (1 al 19)</button>
            <button class="menu-btn btn-disabled" onclick="alert('Módulo en construcción. ¡Pronto agregaremos cálculo de caídas de tensión y leyes eléctricas!')">📐 Estudiar Cálculos Matemáticos (Pronto)</button>
        </div>

        <div id="screen-ric" class="screen">
            <h1>Normativa RIC</h1>
            <h2>Selecciona la longitud del test</h2>
            <button class="menu-btn" onclick="iniciarTest(10)">⏱️ Test Corto (10 Preguntas)</button>
            <button class="menu-btn" onclick="iniciarTest(20)">📝 Test Intermedio (20 Preguntas)</button>
            <button class="menu-btn" onclick="iniciarTest(30)">🔥 Test Largo (30 Preguntas)</button>
            <button class="menu-btn btn-back" onclick="showScreen('screen-main')">← Volver al inicio</button>
        </div>

        <div id="screen-quiz" class="screen">
            <h1>Entrenador RIC</h1>
            
            <div id="quiz-content">
                <div class="score-board">
                    Pregunta <span id="current-question-text">1</span> de <span id="total-questions-text">X</span> | Puntaje: <span id="score-text">0</span>
                </div>
                <div class="question" id="question-text">Cargando pregunta...</div>
                <div class="options" id="options-container"></div>
                <div class="feedback" id="feedback-text"></div>
                <button id="next-btn" onclick="siguientePregunta()">Siguiente Pregunta</button>
            </div>

            <div id="results-content" style="display: none;">
                <h2 style="text-align:center; color:white; font-size: 24px;">¡Test Completado!</h2>
                <p style="text-align:center; font-size:18px; margin-bottom: 30px;">
                    Tu puntaje final es: <br><strong style="font-size: 36px; color: #a8e6cf;" id="final-score">0</strong><br> de <span id="max-score">0</span> puntos.
                </p>
                <button class="menu-btn" onclick="reintentarTest()">🔄 Reintentar Test</button>
                <button class="menu-btn btn-back" onclick="showScreen('screen-main')">🏠 Volver al Menú Principal</button>
            </div>

        </div>

    </div>

    <script>
        // BASE DE DATOS: 30 Preguntas
        const baseDePreguntas = [
            { pregunta: "¿Cuál es la sección mínima obligatoria para un circuito de enchufes de uso general?", opciones: ["A) 1,5 mm²", "B) 2,5 mm²", "C) 4,0 mm²", "D) 6,0 mm²"], respuestaCorrecta: 1, explicacion: "El RIC N°04 exige una sección mínima de 2,5 mm² para circuitos de enchufes." },
            { pregunta: "¿Cuál es la sensibilidad máxima obligatoria de un diferencial para proteger a las personas?", opciones: ["A) 10 mA", "B) 30 mA", "C) 100 mA", "D) 300 mA"], respuestaCorrecta: 1, explicacion: "El RIC N°06 establece que la sensibilidad máxima para protección contra contactos directos es 30 mA." },
            { pregunta: "¿Cuál es la cantidad máxima de centros (puntos) permitida en un circuito de uso general?", opciones: ["A) 10 centros", "B) 15 centros", "C) 20 centros", "D) Sin límite"], respuestaCorrecta: 1, explicacion: "El RIC N°10 dicta un máximo de 15 centros o 2.000 VA por circuito." },
            { pregunta: "Si la Fase es Roja y el Neutro Blanco, ¿de qué color es la Tierra de Protección (PE)?", opciones: ["A) Azul", "B) Negro", "C) Verde o Verde/Amarillo", "D) Desnudo"], respuestaCorrecta: 2, explicacion: "RIC N°04: El conductor PE debe ser siempre verde o verde/amarillo." },
            { pregunta: "En un alimentador, ¿cuál es el porcentaje máximo permitido de caída de tensión?", opciones: ["A) 2%", "B) 3%", "C) 5%", "D) 10%"], respuestaCorrecta: 1, explicacion: "RIC N°03: Máximo 3% en alimentador y 5% total hasta el circuito final." },
            { pregunta: "¿Qué porcentaje de espacio libre debe tener un tablero eléctrico para reservas?", opciones: ["A) 10%", "B) 15%", "C) 25%", "D) 40%"], respuestaCorrecta: 2, explicacion: "RIC N°02 exige un mínimo de 25% de volumen libre para futuras ampliaciones." },
            { pregunta: "¿Cuál es la autonomía mínima obligatoria para luces de emergencia?", opciones: ["A) 30 min", "B) 60 min", "C) 90 min", "D) 120 min"], respuestaCorrecta: 2, explicacion: "RIC N°08: Las luces de emergencia deben asegurar mínimo 90 minutos de autonomía." },
            { pregunta: "¿Qué voltaje se considera 'Tensión de Seguridad' en recintos secos?", opciones: ["A) 12 V", "B) 24 V", "C) 50 V", "D) 110 V"], respuestaCorrecta: 2, explicacion: "RIC N°05 considera 50V AC como el límite de tensión de seguridad en seco." },
            { pregunta: "¿Cuál es la capacidad de ruptura mínima de un disyuntor en una instalación residencial?", opciones: ["A) 3 kA", "B) 4,5 kA", "C) 6 kA", "D) 10 kA"], respuestaCorrecta: 2, explicacion: "RIC N°06: Para empalmes e instalaciones domiciliarias se exige un mínimo de 6 kA." },
            { pregunta: "¿Qué color corresponde obligatoriamente al conductor Neutro?", opciones: ["A) Negro", "B) Blanco", "C) Azul", "D) Rojo"], respuestaCorrecta: 1, explicacion: "RIC N°04: El neutro siempre debe estar identificado con color blanco." },
            { pregunta: "En lugares de reunión de personas (ej: CESFAM), los cables deben ser:", opciones: ["A) Blindados", "B) Libres de halógenos", "C) De aluminio", "D) Multipolares gruesos"], respuestaCorrecta: 1, explicacion: "RIC N°07 obliga a usar conductores libres de halógenos para evitar humos tóxicos." },
            { pregunta: "Al medir Resistencia de Aislación (220V), ¿cuál es el valor mínimo aceptable?", opciones: ["A) 0,5 MΩ", "B) 1 MΩ", "C) 10 MΩ", "D) 100 Ω"], respuestaCorrecta: 1, explicacion: "RIC N°19 exige un mínimo de 1 Megaohm medido a 500V DC." },
            { pregunta: "¿Dónde debe instalarse la caja de empalme eléctrico?", opciones: ["A) Tablero general", "B) Poste público", "C) Límite de propiedad accesible desde vía pública", "D) En el entretecho"], respuestaCorrecta: 2, explicacion: "RIC N°01: Debe permitir la lectura y acceso de la compañía desde la vía pública." },
            { pregunta: "¿A qué altura deben instalarse los dispositivos de maniobra en un tablero?", opciones: ["A) 1,0 m a 1,5 m", "B) 0,45 m a 2,0 m", "C) Sobre 2,5 m", "D) Zócalo"], respuestaCorrecta: 1, explicacion: "RIC N°02: Altura de operación permitida entre 0,45 m y 2,0 m del suelo." },
            { pregunta: "Los circuitos de alumbrado y enchufes deben ser:", opciones: ["A) Compartidos en el mismo ducto siempre", "B) Protegidos por un solo disyuntor general", "C) Independientes y separados", "D) Sin tierra los de alumbrado"], respuestaCorrecta: 2, explicacion: "RIC N°10 exige la separación física y eléctrica de circuitos de alumbrado y enchufes." },
            { pregunta: "¿Qué grado de protección IP mínimo exige un tablero a la intemperie?", opciones: ["A) IP20", "B) IP41", "C) IP44", "D) IP54"], respuestaCorrecta: 3, explicacion: "RIC N°02: En exteriores (intemperie), los tableros deben ser mínimo IP54." },
            { pregunta: "¿Cuál es la distancia horizontal mínima entre un enchufe y una tina de baño?", opciones: ["A) 0,3 metros", "B) 0,6 metros", "C) 1,0 metro", "D) 1,5 metros"], respuestaCorrecta: 1, explicacion: "RIC N°11 (Zonas húmedas) prohíbe enchufes a menos de 0,6 m de la tina (Volumen 2)." },
            { pregunta: "¿Qué tipo de esquema de conexión a tierra es obligatorio en pabellones de hospitales (CESFAM)?", opciones: ["A) TT", "B) TN-S", "C) TN-C-S", "D) IT"], respuestaCorrecta: 3, explicacion: "RIC N°13: Para evitar cortes vitales por fugas, se usa esquema IT con monitor de aislación." },
            { pregunta: "¿Cuál es la ocupación máxima permitida (factor de relleno) en un ducto con 3 o más cables?", opciones: ["A) 25%", "B) 33%", "C) 40%", "D) 60%"], respuestaCorrecta: 2, explicacion: "RIC N°04: El factor de ocupación de tuberías no debe exceder el 40%." },
            { pregunta: "¿Qué elemento es obligatorio en un tablero para evitar el contacto accidental con partes energizadas?", opciones: ["A) Cerradura con llave", "B) Mandil (cubre-equipos)", "C) Luz piloto", "D) Letrero de peligro"], respuestaCorrecta: 1, explicacion: "RIC N°02 exige una placa muerta o mandil que cubra las conexiones internas." },
            { pregunta: "¿Qué característica debe tener el disyuntor general respecto al empalme?", opciones: ["A) Ser siempre de 40A", "B) Ser mayor a la capacidad del empalme", "C) No ser mayor a la capacidad del empalme", "D) No requiere disyuntor"], respuestaCorrecta: 2, explicacion: "RIC N°01: La protección general del tablero NUNCA debe superar la capacidad nominal del empalme asignado." },
            { pregunta: "¿Qué curva de disparo se recomienda para motores o equipos con alta corriente de partida?", opciones: ["A) Curva B", "B) Curva C", "C) Curva D", "D) Curva Z"], respuestaCorrecta: 2, explicacion: "RIC N°06: La Curva D soporta peacks de arranque muy altos (transformadores, motores grandes)." },
            { pregunta: "En una instalación de piscina, ¿cuál es el voltaje máximo permitido en luces sumergidas?", opciones: ["A) 12 V", "B) 24 V", "C) 50 V", "D) 110 V"], respuestaCorrecta: 0, explicacion: "RIC N°11: Por riesgo extremo de electrocución, se limitan a 12V AC máximo." },
            { pregunta: "¿Se permite la instalación de enchufes justo sobre el lavaplatos o quemadores de cocina?", opciones: ["A) Sí, si tienen tapa", "B) Sí, si están a más de 2 metros", "C) No, está prohibido", "D) Sí, pero solo de 10A"], respuestaCorrecta: 2, explicacion: "RIC N°10 prohíbe explícitamente instalar enchufes en la proyección vertical de lavaplatos o zonas de cocción." },
            { pregunta: "¿Cómo se llama el trámite final para declarar una instalación eléctrica ante la SEC?", opciones: ["A) Formulario TE1", "B) Certificado RIC", "C) Protocolo de Aislación", "D) Anexo 5"], respuestaCorrecta: 0, explicacion: "RIC N°18: Todo proyecto finalizado se declara mediante el formulario TE1." },
            { pregunta: "¿Cuál es la sección mínima para el conductor de un circuito de alumbrado?", opciones: ["A) 1,0 mm²", "B) 1,5 mm²", "C) 2,5 mm²", "D) 4,0 mm²"], respuestaCorrecta: 1, explicacion: "RIC N°04 exige al menos 1,5 mm² para circuitos exclusivos de iluminación." },
            { pregunta: "Si se instalan circuitos mixtos (luces y enchufes juntos), ¿qué protección es obligatoria?", opciones: ["A) Disyuntor Curva D", "B) Protector de sobretensión", "C) Protector diferencial", "D) Ninguna adicional"], respuestaCorrecta: 2, explicacion: "RIC N°10: Al mezclar cargas, el circuito debe contar obligatoriamente con protección diferencial." },
            { pregunta: "¿Qué es la Tierra de Servicio?", opciones: ["A) El cable verde en los enchufes", "B) La conexión a tierra de carcasas metálicas", "C) La puesta a tierra del neutro del transformador o empalme", "D) Una barra de cobre de reserva"], respuestaCorrecta: 2, explicacion: "RIC N°05: La tierra de servicio fija el potencial de referencia del sistema (conecta el Neutro a tierra)." },
            { pregunta: "¿Qué documento debe generarse siempre al terminar de cablear un tablero nuevo antes de entregarlo?", opciones: ["A) Factura de materiales", "B) Cuadro de cargas", "C) Protocolos de prueba (Aislación/Tierra)", "D) Foto del armado"], respuestaCorrecta: 2, explicacion: "RIC N°19 obliga a realizar y registrar los protocolos de pruebas antes de la energización final." },
            { pregunta: "Si uso tubería EMT en una instalación expuesta, ¿qué debo hacer con la tubería respecto a la seguridad?", opciones: ["A) Pintarla de amarillo", "B) Conectarla a la Tierra de Protección", "C) Aislarla con huincha", "D) No requiere tratamiento"], respuestaCorrecta: 1, explicacion: "RIC N°04 y 05: Toda canalización metálica es una masa y debe estar conectada a la tierra de protección." }
        ];

        let preguntasDelTest = [];
        let preguntaActual = 0;
        let puntaje = 0;
        let cantidadActual = 0; // Guarda la cantidad de preguntas elegidas para el "Reintentar"

        // Navegación entre pantallas
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Mezclador aleatorio
        function mezclarPreguntas(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function iniciarTest(cantidad) {
            cantidadActual = cantidad; // Lo guardamos por si quiere reintentar
            
            // Ocultamos resultados, mostramos quiz
            document.getElementById("results-content").style.display = "none";
            document.getElementById("quiz-content").style.display = "block";

            let preguntasMezcladas = mezclarPreguntas([...baseDePreguntas]); 
            preguntasDelTest = preguntasMezcladas.slice(0, cantidad);
            
            preguntaActual = 0;
            puntaje = 0;
            document.getElementById("total-questions-text").innerText = cantidad;
            document.getElementById("score-text").innerText = "0";

            showScreen('screen-quiz');
            cargarPregunta();
        }

        function reintentarTest() {
            iniciarTest(cantidadActual);
        }

        function cargarPregunta() {
            document.getElementById("feedback-text").innerText = "";
            document.getElementById("next-btn").style.display = "none";
            const contenedorOpciones = document.getElementById("options-container");
            contenedorOpciones.innerHTML = "";

            document.getElementById("current-question-text").innerText = preguntaActual + 1;

            const pregunta = preguntasDelTest[preguntaActual];
            document.getElementById("question-text").innerText = pregunta.pregunta;

            pregunta.opciones.forEach((opcion, index) => {
                const boton = document.createElement("button");
                boton.innerText = opcion;
                boton.classList.add("option-btn");
                boton.onclick = () => verificarRespuesta(index, boton);
                contenedorOpciones.appendChild(boton);
            });
        }

        function verificarRespuesta(indiceSeleccionado, botonSeleccionado) {
            const pregunta = preguntasDelTest[preguntaActual];
            const botones = document.querySelectorAll(".option-btn");

            botones.forEach(btn => btn.style.pointerEvents = 'none');

            if (indiceSeleccionado === pregunta.respuestaCorrecta) {
                botonSeleccionado.classList.add("correct");
                puntaje += 10;
                document.getElementById("score-text").innerText = puntaje;
                document.getElementById("feedback-text").innerText = "¡Correcto! " + pregunta.explicacion;
                document.getElementById("feedback-text").style.color = "#a8e6cf"; 
            } else {
                botonSeleccionado.classList.add("wrong");
                botones[pregunta.respuestaCorrecta].classList.add("correct"); 
                document.getElementById("feedback-text").innerText = "Incorrecto. " + pregunta.explicacion;
                document.getElementById("feedback-text").style.color = "#f44336"; 
            }

            document.getElementById("next-btn").style.display = "block";
        }

        function siguientePregunta() {
            // Ocultamos el botón rápido para evitar doble clic accidental
            document.getElementById("next-btn").style.display = "none";

            preguntaActual++;
            if (preguntaActual < preguntasDelTest.length) {
                cargarPregunta();
            } else {
                // Final del test: Ocultamos panel de preguntas, mostramos panel de resultados
                document.getElementById("quiz-content").style.display = "none";
                document.getElementById("results-content").style.display = "block";
                
                document.getElementById("final-score").innerText = puntaje;
                document.getElementById("max-score").innerText = preguntasDelTest.length * 10;
            }
        }
    </script>
</body>
</html>
